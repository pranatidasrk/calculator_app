{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: calculator-ingress

spec:
  rules:
  - host: calculator.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: calculator-service

            port:
              number: 80

{{- end }}