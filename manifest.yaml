apiVersion: apps/v1
kind: Deployment

metadata:
  name: calculator-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: calculator

  template:
    metadata:
      labels:
        app: calculator

    spec:
      containers:
      - name: calculator-container
        image: pranatidasrk/calculatorapp:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: calculator-service

spec:
  type: NodePort

  selector:
    app: calculator

  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30007